name: iOS TestFlight

# 手動トリガー。Actions タブ →「Run workflow」または:
#   gh workflow run ios-testflight.yml -f version=1.1.4 -f changelog="広告設定の修正"
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (CFBundleShortVersionString), 例: 1.1.4"
        required: true
        type: string
      changelog:
        description: "TestFlight の「テスト対象」に表示するメモ（任意）"
        required: false
        type: string

# 同時実行を直列化（署名/ビルド番号採番の競合を避ける）
concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ModernJamaica
    steps:
      - uses: actions/checkout@v4

      # fmt(consteval)の Xcode 26 非互換は Podfile の post_install で全環境共通に修正済み。
      # ランナーの既定 Xcode を使う（macos-15 は安定版 Xcode 16/26 系）。
      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ModernJamaica/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Ruby (bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # Gemfile.lock の BUNDLED WITH は 1.17.2 だが、それは Ruby 3.3 で
          # 削除された String#untaint を呼び NoMethodError で落ちる。Ruby 3.3 対応の
          # 新しい Bundler を使わせる（lock の resolved gem 群はそのまま）。
          bundler: latest
          bundler-cache: true
          working-directory: ModernJamaica

      - name: Install CocoaPods (retry for CDN 429)
        working-directory: ModernJamaica/ios
        run: |
          for i in 1 2 3 4 5; do
            bundle exec pod install && break
            echo "pod install failed (attempt $i) — retrying in 60s..."
            sleep 60
          done
          diff -q Podfile.lock Pods/Manifest.lock

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          bundle exec fastlane ios beta \
            version:"${{ inputs.version }}" \
            changelog:"${{ inputs.changelog }}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ModernJamaica-ipa
          path: ModernJamaica/build/*.ipa
          if-no-files-found: ignore
